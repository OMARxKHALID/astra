services:
  - type: web
    name: watch-together-ws
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        sync: false # Set to your Vercel URL, e.g. https://watch-together-ebon.vercel.app
      - key: JWT_SECRET
        sync: false # MUST match the JWT_SECRET set in Vercel environment variables
